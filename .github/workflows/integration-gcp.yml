name: Integration Tests - GCP

on:
  workflow_dispatch: {}  # allow manual runs for testing
  push:
    branches:
      - main
      - feature/oidc-gcp

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  copy-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_TAG: main-27ca26d
      IDENTITY_PROVIDER: "projects/1015254933832/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      SERVICE_ACCOUNT: "github-actions-user@nv-dgxck8s-20250306.iam.gserviceaccount.com"


    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      # Auth
      - name: Get AuthN Token
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      # Cluster
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1
        with:
          version: '>= 547.0.0'

      - name: Create Cluster
        id: cluster
        shell: bash
        env:
          DEPLOYMENT_ID: ${{ github.run_id }}
        run: tests/uat/gcp/cluster/up

      # Test
      - name: Install NVS
        shell: bash
        env: 
          CSP: "gcp"
          NVSENTINEL_VERSION: ${{ env.IMAGE_TAG }}
        run: tests/uat/install-apps.sh

      - name: Run UAT Tests
        shell: bash
        run: tests/uat/tests.sh

      # Teardown
      - name: Destroy Cluster
        if: always() && steps.cluster.outcome != 'skipped'
        shell: bash
        env:
          DEPLOYMENT_ID: ${{ github.run_id }}
        run: tests/uat/gcp/cluster/down