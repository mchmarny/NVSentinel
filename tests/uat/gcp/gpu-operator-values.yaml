# GPU Operator values for GCP/GKE
# GKE automatically manages GPU drivers for A4, L4, H100, and other GPU instances.
# 
# This file is kept for reference but the install script now skips GPU Operator for CSP=gcp
# See: https://cloud.google.com/kubernetes-engine/docs/how-to/gpus#installing_drivers

dcgm:
  enabled: true

driver:
  enabled: true

toolkit:
  enabled: true
  installDir: /home/kubernetes/bin/nvidia

devicePlugin:
  enabled: false

dcgmExporter:
  enabled: true

operator:
  defaultRuntime: containerd
  runtimeClass: ""

gfd:
  enabled: true

cdi:
  enabled: true
  default: true

hostPaths:
  driverInstallDir: /home/kubernetes/bin/nvidia

# NVSentinel-specific configuration for GPU health monitor
# (This is for NVSentinel chart, not GPU Operator)
gpu-health-monitor:
  additionalVolumeMounts:
    - mountPath: /usr/local/nvidia
      name: nvidia-install-dir-host
      readOnly: true
    - mountPath: /etc/vulkan/icd.d
      name: vulkan-icd-mount
      readOnly: true
  additionalHostVolumes:
    - name: vulkan-icd-mount
      hostPath:
        path: /home/kubernetes/bin/nvidia/vulkan/icd.d
        type: Directory
    - name: nvidia-install-dir-host
      hostPath:
        path: /home/kubernetes/bin/nvidia
        type: Directory
